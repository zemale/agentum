databases:
  - name: agentum-postgres
    databaseName: agentum
    user: agentum
    plan: free

services:
  - type: redis
    name: agentum-redis
    plan: free
    ipAllowList: []

  - type: web
    name: agentum-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install && npx prisma generate && npm run build
    startCommand: cd backend && npx prisma migrate deploy && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: agentum-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: agentum-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
    healthCheckPath: /health

  - type: web
    name: agentum-frontend
    runtime: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://agentum-backend.onrender.com

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      
      - name: Install root dependencies
        run: npm ci
      
      - name: Build shared
        run: cd shared && npm ci
      
      - name: Build backend
        run: |
          cd backend
          npm ci
          npx prisma generate
          npm run build
      
      - name: Build frontend  
        run: |
          cd frontend
          npm ci
          npm run build
